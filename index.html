<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快乐 | 单坷钰</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Microsoft YaHei", sans-serif;
    padding: 20px;
    transition: background 1.2s ease;
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 50px 35px;
    max-width: 520px;
    width: 100%;
    text-align: center;
    box-shadow: 0 12px 35px rgba(0,0,0,0.1);
    position: relative;
    z-index: 2;
  }
  h1 {
    font-size: 32px;
    color: #ff3333;
    margin-bottom: 10px;
  }
  h2 {
    font-size: 24px;
    color: #222;
    margin-bottom: 26px;
    font-weight: normal;
  }
  .emoji {
    font-size: 46px;
    margin-bottom: 16px;
  }
  .text {
    font-size: 18px;
    line-height: 1.9;
    color: #444;
    margin: 16px 0;
  }
  .btn {
    margin: 12px;
    padding: 14px 32px;
    background: #ff4d4f;
    color: #fff;
    border-radius: 50px;
    border: none;
    font-size: 17px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .btn2 {
    background: #ff9500;
  }
  .btn:hover {
    transform: scale(1.05);
  }
  .from {
    margin-top: 35px;
    font-size: 16px;
    color: #777;
  }
  .msg {
    margin-top: 20px;
    font-size: 19px;
    color: #ff3366;
    font-weight: bold;
    display: none;
  }
  .hidden-text {
    display: none;
    margin-top: 20px;
    font-size: 17px;
    color: #222;
    line-height: 1.8;
  }
</style>
</head>

<body>

<div class="card">
  <div class="emoji">🎉🎂🎈🎊</div>
  <h1>祝 单坷钰 19岁生日快乐！</h1>
  <h2>河南最帅小伙 · 岁岁皆欢喜</h2>

  <div class="text">
    愿你新的一岁<br>
    眼里有光，心中有梦<br>
    一路坦荡，万事顺遂<br>
    平安喜乐，闪闪发光✨
  </div>

  <div class="text">
    少年意气，未来可期<br>
    不止生日快乐，是日日都快乐
  </div>

  <button class="btn" onclick="celebrate()">点我接收祝福 🎉</button>
  <button class="btn btn2" onclick="showSecret()">查看专属寄语 💌</button>
  
  <div id="msg" class="msg"></div>
  <div id="secret" class="hidden-text">
    19岁，是闪闪发光的年纪<br>
    愿单坷钰永远热烈、永远自由<br>
    所有美好都如期而至，所有愿望都能实现<br>
    平安顺遂，一生被爱 ❤️
  </div>

  <div class="from">
    From 白月扬 ❤️
  </div>
</div>

<script>
// 每次点击 自动换背景色
const backgrounds = [
  "linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)",
  "linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)",
  "linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)",
  "linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%)",
  "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)",
  "linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)",
  "linear-gradient(135deg, #fa709a 0%, #fee140 100%)"
];

let isPlaying = false;

function celebrate() {
  if (isPlaying) return;
  isPlaying = true;

  // 随机换背景
  const randomBg = backgrounds[Math.floor(Math.random() * backgrounds.length)];
  document.body.style.background = randomBg;

  // 随机祝福语
  const texts = [
    "单坷钰，19岁生日快乐！🎂",
    "河南帅小伙，越来越帅！",
    "平安喜乐，万事胜意！",
    "前程似锦，一路开挂！✨",
    "19岁，光芒万丈！🌟",
    "岁岁无忧，年年欢喜！🥳"
  ];
  const msg = document.getElementById("msg");
  msg.innerText = texts[Math.floor(Math.random() * texts.length)];
  msg.style.display = "block";

  // 超多特效：烟花 + 飘落
  const emojis = ['🎂', '🎉', '🎈', '🎊', '❤️', '✨', '⭐', '🎁', '🏆'];
  for (let i = 0; i < 100; i++) {
    const e = emojis[Math.floor(Math.random() * emojis.length)];
    const span = document.createElement('span');
    span.textContent = e;

    const x = (Math.random() - 0.5) * 600;
    const y = (Math.random() - 0.5) * 700;
    const size = 20 + Math.random() * 25;
    const delay = Math.random() * 300;

    span.style.cssText = `
      position: fixed;
      top: 40%;
      left: 50%;
      font-size: ${size}px;
      z-index: 999;
      pointer-events: none;
      opacity: 1;
      transition: transform 1.7s ease-out, opacity 1.5s ease;
      transition-delay: ${delay}ms;
    `;
    document.body.appendChild(span);

    setTimeout(() => {
      span.style.transform = `translate(${x}px, ${y}px)`;
      span.style.opacity = 0;
    }, 10);

    setTimeout(() => span.remove(), 2200);
  }

  setTimeout(() => {
    isPlaying = false;
  }, 2200);
}

function showSecret() {
  const secret = document.getElementById("secret");
  secret.style.display = "block";
}
</script>

</body>
</html>
