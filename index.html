<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快乐 | 单坷钰</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Microsoft YaHei", sans-serif;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 40px 30px;
    max-width: 500px;
    width: 100%;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }
  h1 {
    font-size: 28px;
    color: #ff4444;
    margin-bottom: 10px;
  }
  h2 {
    font-size: 22px;
    color: #333;
    margin-bottom: 20px;
  }
  .emoji {
    font-size: 40px;
    margin: 10px 0;
  }
  .text {
    font-size: 17px;
    line-height: 1.8;
    color: #555;
    margin: 15px 0;
  }
  .from {
    margin-top: 30px;
    font-size: 16px;
    color: #777;
  }
</style>
</head>

<body>

<div class="card">
  <div class="emoji">🎉🎂🎈🎊</div>
  <h1>祝 单坷钰 19岁 生日快乐！</h1>
  <h2>河南最帅小伙，岁岁皆胜意</h2>

  <div class="text">
    愿你新的一岁<br>
    眼里有光，心中有梦<br>
    一路坦荡，万事顺遂<br>
    平安喜乐，闪闪发光✨
  </div>

  <div class="text">
    少年意气，未来可期<br>
    不止生日快乐，是日日都快乐
  </div>

  <div class="from">
    来自你最好的朋友 ❤️
  </div>
</div>

</body>
</html>
