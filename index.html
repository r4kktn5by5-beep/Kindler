<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生日快乐 | 单坷钰</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Microsoft YaHei", sans-serif;
    padding: 20px;
    transition: background 1s ease;
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 50px 35px;
    max-width: 520px;
    width: 100%;
    text-align: center;
    box-shadow: 0 12px 35px rgba(0,0,0,0.1);
    position: relative;
    z-index: 2;
  }
  h1 {
    font-size: 32px;
    color: #ff3333;
    margin-bottom: 10px;
  }
  h2 {
    font-size: 24px;
    color: #222;
    margin-bottom: 26px;
    font-weight: normal;
  }
  .emoji {
    font-size: 46px;
    margin-bottom: 16px;
  }
  .text {
    font-size: 18px;
    line-height: 1.9;
    color: #444;
    margin: 16px 0;
  }
  .btn {
    margin: 12px;
    padding: 14px 32px;
    background: #ff4d4f;
    color: #fff;
    border-radius: 50px;
    border: none;
    font-size: 17px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .btn:hover {
    transform: scale(1.05);
  }
  .from {
    margin-top: 35px;
    font-size: 16px;
    color: #777;
  }
  .msg {
    margin-top: 20px;
    font-size: 19px;
    color: #ff3366;
    font-weight: bold;
    display: none;
  }
</style>
</head>

<body>

<div class="card">
  <div class="emoji">🎉🎂🎈🎊</div>
  <h1>祝 单坷钰 19岁生日快乐！</h1>
  <h2>河南最帅小伙 · 岁岁皆欢喜</h2>

  <div class="text">
    愿你新的一岁<br>
    眼里有光，心中有梦<br>
    一路坦荡，万事顺遂<br>
    平安喜乐，闪闪发光✨
  </div>

  <div class="text">
    少年意气，未来可期<br>
    不止生日快乐，是日日都快乐
  </div>

  <button class="btn" onclick="celebrate()">点我接收祝福 🎉</button>
  <div id="msg" class="msg"></div>

  <div class="from">
    From 白月扬 ❤️
  </div>
</div>

<script>
function celebrate() {
  // 变色
  document.body.style.background = "linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%)";
  
  // 祝福文字
  const texts = [
    "单坷钰，生日快乐！🎂",
    "河南帅小伙，越来越帅！",
    "平安喜乐，万事胜意！",
    "前程似锦，一路开挂！✨"
  ];
  const msg = document.getElementById("msg");
  msg.innerText = texts[Math.floor(Math.random() * texts.length)];
  msg.style.display = "block";

  // 礼花特效
  const emojis = ['🎂', '🎉', '🎈', '🎊', '❤️', '✨', '⭐'];
  for (let i = 0; i < 80; i++) {
    const e = emojis[Math.floor(Math.random() * emojis.length)];
    const span = document.createElement('span');
    span.textContent = e;
    
    const x = (Math.random() - 0.5) * 500;
    const y = (Math.random() - 0.5) * 650;
    const size = 22 + Math.random() * 18;
    
    span.style.cssText = `
      position: fixed;
      top: 40%;
      left: 50%;
      font-size: ${size}px;
      z-index: 999;
      pointer-events: none;
      opacity: 1;
      transition: transform 1.8s ease-out, opacity 1.6s ease;
    `;
    document.body.appendChild(span);

    setTimeout(() => {
      span.style.transform = `translate(${x}px, ${y}px)`;
      span.style.opacity = 0;
    }, 10);

    setTimeout(() => span.remove(), 2000);
  }
}
</script>

</body>
</html>
